<!doctype html>
<html lang="en">
  <head>
    <script>
      // Make window.fetch writable in environments where it is a read-only getter
      try {
        let currentFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          get() {
            return currentFetch;
          },
          set(value) {
            currentFetch = value;
          },
          configurable: true,
          enumerable: true
        });
      } catch (e) {
        console.warn('Could not redefine window.fetch:', e);
      }
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kapsul4D - FIFA World Cup 2026</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
